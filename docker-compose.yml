# Full stack: App + MySQL + Ollama. Run: docker compose up -d
# App UI: http://localhost:8501
# Stop:   docker compose down

services:
  app:
    build: .
    container_name: healthcare-ai-app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: readonly_user
      MYSQL_PASSWORD: readonly_pass
      MYSQL_DATABASE: healthcare_db
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      CHROMA_PERSIST_PATH: /tmp/chroma_data
      AUDIT_LOG_PATH: /tmp/audit_log.jsonl
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: healthcare-ai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/mysql/02-readonly-user.sql:/docker-entrypoint-initdb.d/02-readonly-user.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: healthcare-ai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 20s

volumes:
  ollama_data:
